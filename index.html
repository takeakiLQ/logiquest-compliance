<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>法令対応・単価相談管理 | ロジクエスト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-slate-800">法令対応・単価相談管理</h1>
      <p class="text-sm text-slate-500 mt-1">公正取引推進室</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 p-8 shadow-sm">
      <p class="text-sm text-slate-600 text-center mb-6">
        ロジクエストのGoogleアカウントでログインしてください
      </p>
      <button id="login-btn"
        class="w-full flex items-center justify-center gap-3 border border-slate-200 rounded-xl px-4 py-3 hover:bg-slate-50 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span class="text-sm font-medium text-slate-700">Googleでログイン</span>
      </button>
      <div id="error-msg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 text-center"></div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      @logiquest.co.jp アカウントのみ利用可能
    </p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAy3bHVIg7f_BGhPdFOPG86k8dTsp4yX6g",
      authDomain: "logiquest-compliance.firebaseapp.com",
      projectId: "logiquest-compliance",
      storageBucket: "logiquest-compliance.firebasestorage.app",
      messagingSenderId: "34310317694",
      appId: "1:34310317694:web:9f2c4fbb530cd0b8beda2f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const ALLOWED_DOMAIN = 'logiquest.co.jp';

    // すでにログイン済みなら直接遷移
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const domain = user.email.split('@')[1];
        if (domain === ALLOWED_DOMAIN) {
          window.location.href = 'app.html';
        }
      }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ hd: ALLOWED_DOMAIN });

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const domain = user.email.split('@')[1];

        if (domain !== ALLOWED_DOMAIN) {
          await auth.signOut();
          showError(`${ALLOWED_DOMAIN} のアカウントのみ利用できます`);
          return;
        }

        window.location.href = 'app.html';
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
          showError('ログインに失敗しました: ' + e.message);
        }
      }
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
