<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>法令対応・単価相談管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Alpine.jsの初期化を遅延させる
    document.addEventListener('alpine:init', () => {
      // appDataがセットされるまで待つ
    });
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .chat-bubble-me { border-radius: 18px 18px 4px 18px; }
    .chat-bubble-other { border-radius: 18px 18px 18px 4px; }
    #chat-area { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden" x-data="app()" x-init="init()" x-cloak>

  <div x-show="!ready" class="h-screen flex items-center justify-center">
    <div class="text-slate-400 text-sm">読み込み中...</div>
  </div>

  <div x-show="ready" class="h-screen flex overflow-hidden">

    <!-- サイドバー -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0">
      <div class="px-4 py-4 border-b border-slate-200">
        <div class="flex items-center justify-between mb-3">
          <div>
            <h1 class="text-sm font-semibold text-slate-800">法令対応・単価相談</h1>
            <p class="text-xs text-slate-400" x-text="user.name + '（' + user.role + '）'"></p>
          </div>
          <button @click="logout()" class="text-xs text-slate-400 hover:text-slate-600">ログアウト</button>
        </div>
        <button @click="openNewCase()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-3 rounded-lg transition-colors">
          ＋ 新規相談を登録
        </button>
      </div>

      <div class="px-4 py-3 border-b border-slate-100">
        <input type="text" x-model="searchQuery" placeholder="案件を検索..."
          class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
        <div class="flex gap-2 mt-2 flex-wrap">
          <template x-for="s in statusFilters" :key="s.value">
            <button @click="toggleFilter(s.value)"
              :class="activeFilters.includes(s.value) ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-slate-50 text-slate-500 border-slate-200'"
              class="text-xs border rounded-full px-2 py-0.5 transition-colors" x-text="s.label">
            </button>
          </template>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto">
        <template x-for="c in filteredCases" :key="c.id">
          <div @click="selectCase(c)"
            :class="selectedCase && selectedCase.id === c.id ? 'bg-blue-50 border-l-2 border-blue-500' : 'border-l-2 border-transparent hover:bg-slate-50'"
            class="px-4 py-3 cursor-pointer transition-colors border-b border-slate-100">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-slate-800 truncate" x-text="c.contractor_name || '委託先未設定'"></p>
                <p class="text-xs text-slate-500 truncate mt-0.5" x-text="c.shipper_name || '荷主未設定'"></p>
              </div>
              <span :class="statusColor(c.status)"
                class="text-xs px-2 py-0.5 rounded-full whitespace-nowrap flex-shrink-0" x-text="c.status"></span>
            </div>
            <div class="flex items-center justify-between mt-1.5">
              <span class="text-xs text-slate-400" x-text="c.consultation_type"></span>
              <span class="text-xs text-slate-400" x-text="formatDate(c.updated_at)"></span>
            </div>
          </div>
        </template>
        <div x-show="filteredCases.length === 0" class="text-center text-sm text-slate-400 py-10">案件がありません</div>
      </div>
    </aside>

    <!-- メインエリア -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <div x-show="!selectedCase" class="flex-1 flex items-center justify-center text-slate-400 text-sm">
        左の一覧から案件を選択してください
      </div>

      <div x-show="selectedCase" class="flex-1 flex flex-col overflow-hidden">

        <!-- 案件ヘッダー -->
        <div class="bg-white border-b border-slate-200 px-6 py-4">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-3 mb-1">
                <h2 class="text-base font-semibold text-slate-800" x-text="selectedCase && selectedCase.contractor_name"></h2>
                <span :class="selectedCase && statusColor(selectedCase.status)"
                  class="text-xs px-2.5 py-0.5 rounded-full" x-text="selectedCase && selectedCase.status"></span>
                <span x-show="selectedCase && selectedCase.priority === '急'"
                  class="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full">急</span>
              </div>
              <p class="text-sm text-slate-500">
                荷主：<span x-text="selectedCase && selectedCase.shipper_name"></span>
                　担当：<span x-text="selectedCase && selectedCase.owner_name"></span>
              </p>
            </div>
            <div class="flex items-center gap-2">
              <select x-model="newStatus"
                class="text-sm border border-slate-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-blue-400">
                <template x-for="s in statusList" :key="s">
                  <option :value="s" x-text="s"></option>
                </template>
              </select>
              <button @click="changeStatus()"
                class="text-sm bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg transition-colors">
                更新
              </button>
            </div>
          </div>

          <div class="flex gap-4 mt-3">
            <button @click="infoTab = 'contract'"
              :class="infoTab === 'contract' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'"
              class="text-xs pb-1 font-medium">契約条件</button>
            <button @click="infoTab = 'sf'; showSfData()"
              :class="infoTab === 'sf' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'"
              class="text-xs pb-1 font-medium">SF情報</button>
            <button @click="infoTab = 'files'; loadFiles()"
              :class="infoTab === 'files' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400'"
              class="text-xs pb-1 font-medium">ファイル</button>
          </div>

          <div class="mt-3">
            <!-- 契約条件 -->
            <div x-show="infoTab === 'contract'">
              <!-- 編集ロック Switch -->
              <div class="flex items-center justify-between mb-3">
                <span class="text-xs text-slate-500" x-text="editLocked ? 'ロック中（編集不可）' : '編集モード'"></span>
                <div class="flex items-center gap-2">
                  <span class="text-xs" :class="editLocked ? 'text-slate-400' : 'text-blue-600 font-medium'">
                    <svg x-show="editLocked" class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <svg x-show="!editLocked" class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                    </svg>
                  </span>
                  <button @click="editLocked = !editLocked"
                    :class="editLocked ? 'bg-slate-200' : 'bg-blue-500'"
                    class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors">
                    <span :class="editLocked ? 'translate-x-1' : 'translate-x-5'"
                      class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"></span>
                  </button>
                </div>
              </div>

              <!-- 表示モード（ロック時） -->
              <div x-show="editLocked" class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 rounded-lg p-3">
                  <p class="text-xs text-slate-400 mb-1">荷主との契約条件</p>
                  <p class="text-sm text-slate-700 whitespace-pre-wrap" x-text="selectedCase && (selectedCase.shipper_conditions || '未入力')"></p>
                </div>
                <div class="bg-slate-50 rounded-lg p-3">
                  <p class="text-xs text-slate-400 mb-1">委託先との契約条件</p>
                  <p class="text-sm text-slate-700 whitespace-pre-wrap" x-text="selectedCase && (selectedCase.contractor_conditions || '未入力')"></p>
                </div>
              </div>

              <!-- 編集モード（アンロック時） -->
              <div x-show="!editLocked" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-xs text-slate-400 mb-1">荷主名</label>
                    <input type="text" x-model="editCase.shipper_name"
                      class="w-full text-sm border border-blue-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
                  </div>
                  <div>
                    <label class="block text-xs text-slate-400 mb-1">委託先名</label>
                    <input type="text" x-model="editCase.contractor_name"
                      class="w-full text-sm border border-blue-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-xs text-slate-400 mb-1">荷主との契約条件</label>
                    <textarea x-model="editCase.shipper_conditions" rows="3"
                      class="w-full text-sm border border-blue-200 rounded-lg px-3 py-2 resize-none focus:outline-none focus:border-blue-400"></textarea>
                  </div>
                  <div>
                    <label class="block text-xs text-slate-400 mb-1">委託先との契約条件</label>
                    <textarea x-model="editCase.contractor_conditions" rows="3"
                      class="w-full text-sm border border-blue-200 rounded-lg px-3 py-2 resize-none focus:outline-none focus:border-blue-400"></textarea>
                  </div>
                </div>
                <div>
                  <label class="block text-xs text-slate-400 mb-1">相談概要</label>
                  <textarea x-model="editCase.summary" rows="2"
                    class="w-full text-sm border border-blue-200 rounded-lg px-3 py-2 resize-none focus:outline-none focus:border-blue-400"></textarea>
                </div>
                <div class="flex gap-2 justify-end">
                  <button @click="editLocked = true"
                    class="text-xs text-slate-400 hover:text-slate-600 px-3 py-1.5">キャンセル</button>
                  <button @click="saveCase()"
                    class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg transition-colors">保存</button>
                </div>
              </div>
            </div>

            <!-- SF情報 -->
            <div x-show="infoTab === 'sf'">
              <div x-show="sfLoading" class="text-xs text-slate-400">SF情報を取得中...</div>
              <div x-show="!sfLoading" class="space-y-3">
                <div class="grid grid-cols-3 gap-3">
                  <div class="bg-slate-50 rounded p-2">
                    <p class="text-xs text-slate-400">案件名</p>
                    <p class="text-sm text-slate-700 truncate" x-text="sfData && sfData.record_name || '—'"></p>
                  </div>
                  <div class="bg-slate-50 rounded p-2">
                    <p class="text-xs text-slate-400">配車ステータス</p>
                    <p class="text-sm text-slate-700 truncate" x-text="sfData && sfData.driver_situation || '—'"></p>
                  </div>
                  <div class="bg-slate-50 rounded p-2">
                    <p class="text-xs text-slate-400">委託先区分</p>
                    <p class="text-sm text-slate-700 truncate" x-text="sfData && sfData.partner_type || '—'"></p>
                  </div>
                  <div class="bg-slate-50 rounded p-2">
                    <p class="text-xs text-slate-400">開始日</p>
                    <p class="text-sm text-slate-700" x-text="sfData && sfData.start_date || '—'"></p>
                  </div>
                  <div class="bg-slate-50 rounded p-2">
                    <p class="text-xs text-slate-400">終了日</p>
                    <p class="text-sm text-slate-700" x-text="sfData && sfData.end_date || '—'"></p>
                  </div>
                </div>
                <div class="flex items-center justify-between">
                  <p class="text-xs text-slate-400" x-show="sfData && sfData.fetched_at"
                    x-text="'取得日時：' + formatDateTime(sfData && sfData.fetched_at)"></p>
                  <button @click="loadSfData()" x-show="!editLocked"
                    class="text-xs text-blue-600 hover:text-blue-800 border border-blue-200 px-3 py-1 rounded-lg">
                    SFから再取得
                  </button>
                  <span x-show="editLocked" class="text-xs text-slate-400">🔒 再取得はロック解除後に可能</span>
                </div>
              </div>
            </div>

            <!-- ファイル -->
            <div x-show="infoTab === 'files'">
              <div class="flex items-center gap-3 mb-2">
                <input type="file" id="file-input" @change="onFileSelected" class="hidden" multiple />
                <select x-model="uploadFileType" class="text-xs border border-slate-200 rounded px-2 py-1">
                  <option>添付</option>
                  <option>提出書類</option>
                  <option>受領書類</option>
                </select>
                <button @click="document.getElementById('file-input').click()"
                  class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 px-3 py-1 rounded-lg">
                  ファイルを選択（複数可）
                </button>
                <span x-show="uploadingFile" class="text-xs text-slate-400">アップロード中...</span>
              </div>

              <!-- 複数ファイル確認エリア -->
              <div x-show="pendingFiles.length > 0" class="mb-3 bg-blue-50 border border-blue-200 rounded-xl p-3">
                <div class="flex items-center justify-between mb-2">
                  <p class="text-xs font-medium text-blue-700" x-text="pendingFiles.length + '件のファイルをアップロードします'"></p>
                  <button @click="pendingFiles = []" class="text-xs text-slate-400 hover:text-slate-600">全てキャンセル</button>
                </div>
                <div class="space-y-1 mb-3">
                  <template x-for="(pf, idx) in pendingFiles" :key="idx">
                    <div class="flex items-center gap-2 bg-white rounded-lg px-3 py-2">
                      <svg class="w-3.5 h-3.5 text-blue-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
                      </svg>
                      <span class="text-xs text-slate-700 flex-1 truncate" x-text="pf.name"></span>
                      <span class="text-xs text-slate-400" x-text="Math.round(pf.size / 1024) + ' KB'"></span>
                      <button @click="pendingFiles.splice(idx, 1)" class="text-slate-300 hover:text-red-400 ml-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                      </button>
                    </div>
                  </template>
                </div>
                <button @click="confirmUpload()"
                  class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg transition-colors">
                  アップロード確定
                </button>
              </div>
              <div class="space-y-1">
                <template x-for="f in caseFiles" :key="f.id">
                  <div class="flex items-center gap-3 bg-slate-50 rounded p-2">
                    <span :class="fileTypeColor(f.file_type)" class="text-xs px-2 py-0.5 rounded-full" x-text="f.file_type"></span>
                    <a :href="f.url" target="_blank" class="text-sm text-blue-600 hover:underline truncate flex-1" x-text="f.file_name"></a>
                    <span class="text-xs text-slate-400" x-text="f.uploader_name"></span>
                    <span class="text-xs text-slate-400" x-text="formatDate(f.uploaded_at)"></span>
                  </div>
                </template>
                <div x-show="caseFiles.length === 0" class="text-xs text-slate-400 py-2">ファイルなし</div>
              </div>
            </div>
          </div>
        </div>

        <!-- チャットエリア -->
        <div id="chat-area" class="flex-1 overflow-y-auto px-6 py-4 space-y-3">
          <template x-for="msg in messages" :key="msg.id">
            <div>
              <!-- エスカレーション -->
              <div x-show="msg.msg_type === 'エスカレーション'"
                class="bg-amber-50 border border-amber-200 rounded-xl p-4 mx-auto max-w-lg">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs font-medium text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full">エスカレーション</span>
                  <span class="text-xs text-amber-600" x-text="'→ ' + msg.to_user_name"></span>
                </div>
                <p class="text-sm text-slate-700" x-text="msg.body.replace('【エスカレーション】','')"></p>
                <p class="text-xs text-slate-400 mt-1">
                  <span x-text="msg.sender_name"></span>・<span x-text="formatDateTime(msg.sent_at)"></span>
                </p>
              </div>

              <!-- 通常メッセージ -->
              <div x-show="msg.msg_type !== 'エスカレーション'"
                :class="msg.sender_id === user.uid ? 'flex-row-reverse' : ''"
                class="flex items-end gap-2">
                <div x-show="msg.sender_id !== user.uid"
                  :class="roleAvatarColor(msg.sender_role)"
                  class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-medium flex-shrink-0"
                  x-text="msg.sender_name.charAt(0)">
                </div>
                <div :class="msg.sender_id === user.uid ? 'items-end' : 'items-start'" class="flex flex-col max-w-md">
                  <p x-show="msg.sender_id !== user.uid" class="text-xs text-slate-400 mb-1"
                    x-text="msg.sender_name + '（' + msg.sender_role + '）'"></p>
                  <div :class="msg.sender_id === user.uid
                    ? 'bg-blue-600 text-white chat-bubble-me'
                    : 'bg-white border border-slate-200 text-slate-800 chat-bubble-other'"
                    class="px-4 py-2.5 text-sm">
                    <p class="whitespace-pre-wrap" x-text="msg.body"></p>
                  </div>
                  <p class="text-xs text-slate-400 mt-1" x-text="formatDateTime(msg.sent_at)"></p>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- 入力エリア -->
        <div class="bg-white border-t border-slate-200 px-4 py-3">
          <div x-show="showEscalate" class="mb-3 bg-amber-50 border border-amber-200 rounded-xl p-3">
            <p class="text-xs font-medium text-amber-700 mb-2">エスカレーション先を選択</p>
            <select x-model="escalateTarget" class="w-full text-sm border border-amber-200 rounded-lg px-3 py-1.5 bg-white mb-2">
              <option value="">-- ユーザーを選択 --</option>
              <template x-for="u in users" :key="u.id">
                <option :value="u.id + '|' + u.name" x-text="u.name + '（' + u.role + '）'"></option>
              </template>
            </select>
            <button @click="showEscalate = false" class="text-xs text-slate-400">キャンセル</button>
          </div>

          <div class="flex items-end gap-2">
            <button @click="showEscalate = !showEscalate"
              :class="showEscalate ? 'bg-amber-100 text-amber-700' : 'text-slate-400 hover:text-slate-600'"
              class="p-2 rounded-lg transition-colors flex-shrink-0" title="エスカレーション">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12"/>
              </svg>
            </button>
            <textarea x-model="newMessage" @keydown.ctrl.enter="sendMessage()"
              placeholder="メッセージを入力... (Ctrl+Enter で送信)"
              rows="2"
              class="flex-1 text-sm border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-blue-400 resize-none">
            </textarea>
            <button @click="sendMessage()" :disabled="!newMessage.trim()"
              class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 text-white p-2.5 rounded-xl transition-colors flex-shrink-0">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新規案件モーダル -->
  <div x-show="showNewCase" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-xl shadow-xl overflow-y-auto max-h-[90vh]">
      <div class="px-6 py-5 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-base font-semibold text-slate-800">新規相談を登録</h2>
        <button @click="showNewCase = false" class="text-slate-400 hover:text-slate-600">✕</button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">SalesforceレコードID</label>
          <div class="flex gap-2">
            <input type="text" x-model="newCase.sf_record_id" placeholder="a28XXXXXXXXXXXXXXX"
              class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
            <button @click="fetchSfForNewCase()"
              class="text-sm bg-slate-800 text-white px-3 py-2 rounded-lg hover:bg-slate-700">SF取得</button>
          </div>
          <div x-show="sfFetched" class="mt-2 bg-blue-50 rounded-lg p-2 text-xs text-blue-700" x-text="sfFetchedMsg"></div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">荷主名 <span class="text-red-400">*</span></label>
          <input type="text" x-model="newCase.shipper_name"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">委託先名 <span class="text-red-400">*</span></label>
          <input type="text" x-model="newCase.contractor_name"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:border-blue-400" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">相談区分</label>
            <select x-model="newCase.consultation_type"
              class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2">
              <option>単価交渉</option>
              <option>その他法令対応</option>
              <option>契約見直し</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">優先度</label>
            <select x-model="newCase.priority"
              class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2">
              <option>通常</option>
              <option>急</option>
              <option>低</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">荷主との契約条件</label>
          <textarea x-model="newCase.shipper_conditions" rows="3"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">委託先との契約条件</label>
          <textarea x-model="newCase.contractor_conditions" rows="3"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">相談概要</label>
          <textarea x-model="newCase.summary" rows="3"
            placeholder="委託先から単価アップの交渉があった背景・詳細など"
            class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2 resize-none"></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
        <button @click="showNewCase = false" class="text-sm text-slate-500 px-4 py-2">キャンセル</button>
        <button @click="submitNewCase()" :disabled="!newCase.shipper_name || !newCase.contractor_name"
          class="text-sm bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 text-white px-5 py-2 rounded-lg">
          登録する
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import {
      getFirestore, collection, doc, addDoc, updateDoc, onSnapshot,
      query, where, orderBy, serverTimestamp, getDoc, getDocs, setDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAy3bHVIg7f_BGhPdFOPG86k8dTsp4yX6g",
      authDomain: "logiquest-compliance.firebaseapp.com",
      projectId: "logiquest-compliance",
      storageBucket: "logiquest-compliance.firebasestorage.app",
      messagingSenderId: "34310317694",
      appId: "1:34310317694:web:9f2c4fbb530cd0b8beda2f"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwh3-gII3jQ7OVvNaYQ07G0L9w_DVcbDvFljbYlCVFkBk5xRb996iy7H8W8ZmBeCDkh/exec';
    const ALLOWED_DOMAIN = 'logiquest.co.jp';

    window.appData = { auth, db, GAS_URL, ALLOWED_DOMAIN, serverTimestamp, collection, doc, addDoc, updateDoc, onSnapshot, query, where, orderBy, getDoc, getDocs, setDoc };

    // Firebase読み込み完了後にAlpine.jsを動的に読み込む
    const alpineScript = document.createElement('script');
    alpineScript.src = 'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js';
    alpineScript.defer = true;
    document.head.appendChild(alpineScript);
  </script>

  <script>
    function app() {
      return {
        ready: false,
        user: {},
        cases: [],
        selectedCase: null,
        messages: [],
        caseFiles: [],
        users: [],
        sfData: null,
        sfLoading: false,
        newMessage: '',
        showNewCase: false,
        showEscalate: false,
        escalateTarget: '',
        searchQuery: '',
        activeFilters: [],
        newStatus: '',
        infoTab: 'contract',
        uploadFileType: '添付',
        uploadingFile: false,
        pendingFiles: [],
        editLocked: true,
        editCase: {},
        sfFetched: false,
        sfFetchedMsg: '',
        newCase: {},
        unsubMessages: null,

        statusList: ['新規相談','公取確認中','対応方針決定','委託先交渉中','書類提出済','完了','取り下げ'],
        statusFilters: [
          { value: '新規相談', label: '新規' },
          { value: '公取確認中', label: '公取確認中' },
          { value: '対応方針決定', label: '方針決定' },
          { value: '委託先交渉中', label: '交渉中' },
          { value: '書類提出済', label: '書類提出済' },
          { value: '完了', label: '完了' },
        ],

        async init() {
          const { auth, db, collection, getDocs, setDoc, doc, onSnapshot, orderBy, query } = window.appData;

          // 認証チェック
          await new Promise(resolve => {
            const unsub = auth.onAuthStateChanged(async (firebaseUser) => {
              unsub();
              if (!firebaseUser) {
                window.location.href = 'index.html';
                return;
              }
              const domain = firebaseUser.email.split('@')[1];
              if (domain !== window.appData.ALLOWED_DOMAIN) {
                await auth.signOut();
                window.location.href = 'index.html';
                return;
              }

              // ユーザー情報をFirestoreに保存/取得
              const userRef = doc(db, 'users', firebaseUser.uid);
              const userSnap = await getDocs(query(collection(db, 'users')));
              let existingUser = null;
              userSnap.forEach(d => { if (d.id === firebaseUser.uid) existingUser = d.data(); });

              if (!existingUser) {
                await setDoc(userRef, {
                  email: firebaseUser.email,
                  name: firebaseUser.displayName || firebaseUser.email,
                  role: '営業',
                  department: '',
                  created_at: new Date().toISOString(),
                });
                existingUser = { email: firebaseUser.email, name: firebaseUser.displayName, role: '営業', department: '' };
              }

              this.user = { uid: firebaseUser.uid, ...existingUser };
              resolve();
            });
          });

          // 案件一覧をリアルタイムで取得（orderByなしでシンプルに）
          const casesRef = collection(db, 'cases');
          onSnapshot(casesRef, (snapshot) => {
            const allCases = [];
            snapshot.forEach(d => allCases.push({ id: d.id, ...d.data() }));
            // 更新日降順でソート
            allCases.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
            // 営業は自分の案件のみ
            this.cases = this.user.role === '営業'
              ? allCases.filter(c => c.owner_id === this.user.uid)
              : allCases;
          });

          // ユーザー一覧取得
          const userSnap = await getDocs(collection(db, 'users'));
          this.users = [];
          userSnap.forEach(d => this.users.push({ id: d.id, ...d.data() }));

          this.ready = true;
        },

        async selectCase(c) {
          this.selectedCase = c;
          this.newStatus = c.status;
          this.infoTab = 'contract';
          this.sfData = null;
          this.caseFiles = [];
          this.showEscalate = false;
          this.editLocked = true;
          this.pendingFiles = [];
          // 編集用データを初期化
          this.editCase = {
            shipper_name: c.shipper_name || '',
            contractor_name: c.contractor_name || '',
            shipper_conditions: c.shipper_conditions || '',
            contractor_conditions: c.contractor_conditions || '',
            summary: c.summary || '',
          };

          // メッセージをリアルタイム購読（whereのみ、orderByなし）
          if (this.unsubMessages) this.unsubMessages();
          const { db, collection, query, where, onSnapshot } = window.appData;
          const q = query(
            collection(db, 'messages'),
            where('case_id', '==', c.id)
          );
          this.unsubMessages = onSnapshot(q, (snapshot) => {
            this.messages = [];
            snapshot.forEach(d => this.messages.push({ id: d.id, ...d.data() }));
            // 送信日昇順でソート
            this.messages.sort((a, b) => new Date(a.sent_at) - new Date(b.sent_at));
            this.$nextTick(() => {
              const el = document.getElementById('chat-area');
              if (el) el.scrollTop = el.scrollHeight;
            });
          });
        },

        async loadFiles() {
          const { db, collection, query, where, getDocs } = window.appData;
          const q = query(collection(db, 'files'), where('case_id', '==', this.selectedCase.id));
          const snap = await getDocs(q);
          this.caseFiles = [];
          snap.forEach(d => this.caseFiles.push({ id: d.id, ...d.data() }));
        },

        // SF情報をFirestoreのデータから表示（GASは叩かない）
        showSfData() {
          if (!this.selectedCase) return;
          this.sfData = {
            record_name:      this.selectedCase.sf_record_name || '—',
            shipper_name:     this.selectedCase.sf_shipper_name || this.selectedCase.shipper_name || '—',
            contractor_name:  this.selectedCase.sf_contractor_name || this.selectedCase.contractor_name || '—',
            driver_situation: this.selectedCase.sf_driver_situation || '—',
            partner_type:     this.selectedCase.sf_partner_type || '—',
            start_date:       this.selectedCase.sf_start_date || '—',
            end_date:         this.selectedCase.sf_end_date || '—',
            fetched_at:       this.selectedCase.sf_fetched_at || '',
          };
        },

        // GASからSFデータを再取得（必要な場合のみ）
        async loadSfData() {
          if (!this.selectedCase.sf_record_id) return;
          this.sfLoading = true;
          const url = window.appData.GAS_URL + '?action=getSfData&account_id=' + this.selectedCase.sf_record_id;
          const res = await fetch(url);
          const data = await res.json();
          if (data.record) {
            // Firestoreにも保存し直す
            const { db, doc, updateDoc } = window.appData;
            const sfInfo = {
              sf_record_name:      data.record_name || '',
              sf_shipper_name:     data.shipper_name || '',
              sf_contractor_name:  data.contractor_name || '',
              sf_driver_situation: data.driver_situation || '',
              sf_partner_type:     data.partner_type || '',
              sf_start_date:       data.start_date || '',
              sf_end_date:         data.end_date || '',
              sf_fetched_at:       new Date().toISOString(),
            };
            await updateDoc(doc(db, 'cases', this.selectedCase.id), sfInfo);
            Object.assign(this.selectedCase, sfInfo);
            this.showSfData();
          }
          this.sfLoading = false;
        },

        async getGasToken() {
          const { auth } = window.appData;
          const idToken = await auth.currentUser.getIdToken();
          const url = window.appData.GAS_URL + '?action=initSession&idToken=' + encodeURIComponent(idToken);
          const res = await fetch(url);
          const data = await res.json();
          return data.token || '';
        },

        async sendMessage() {
          if (!this.newMessage.trim()) return;
          const { db, collection, addDoc, serverTimestamp } = window.appData;
          const isEscalate = this.showEscalate && this.escalateTarget;
          const [toId, toName] = isEscalate ? this.escalateTarget.split('|') : ['', ''];

          await addDoc(collection(db, 'messages'), {
            case_id: this.selectedCase.id,
            sender_id: this.user.uid,
            sender_name: this.user.name,
            sender_role: this.user.role,
            body: isEscalate ? `【エスカレーション】${this.newMessage}` : this.newMessage,
            sent_at: new Date().toISOString(),
            msg_type: isEscalate ? 'エスカレーション' : '通常',
            to_user_id: toId,
            to_user_name: toName,
          });

          // 案件の更新日を更新
          const { doc, updateDoc } = window.appData;
          await updateDoc(doc(db, 'cases', this.selectedCase.id), {
            updated_at: new Date().toISOString(),
          });

          this.newMessage = '';
          this.showEscalate = false;
          this.escalateTarget = '';
        },

        async changeStatus() {
          if (this.newStatus === this.selectedCase.status) return;
          const { db, doc, updateDoc, collection, addDoc } = window.appData;
          const now = new Date().toISOString();

          await updateDoc(doc(db, 'cases', this.selectedCase.id), {
            status: this.newStatus,
            updated_at: now,
          });

          await addDoc(collection(db, 'status_log'), {
            case_id: this.selectedCase.id,
            old_status: this.selectedCase.status,
            new_status: this.newStatus,
            changed_by: this.user.uid,
            changed_by_name: this.user.name,
            changed_at: now,
          });

          this.selectedCase.status = this.newStatus;
        },

        // ファイル選択（複数対応）
        onFileSelected(event) {
          const files = Array.from(event.target.files);
          this.pendingFiles = [...this.pendingFiles, ...files];
          event.target.value = '';
        },

        // アップロード確定（複数一括）
        async confirmUpload() {
          if (this.pendingFiles.length === 0) return;
          this.uploadingFile = true;
          const files = [...this.pendingFiles];
          this.pendingFiles = [];

          for (const file of files) {
            try {
              const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
              });
              const params = new URLSearchParams({
                action: 'uploadFile',
                case_id: this.selectedCase.id,
                file_name: file.name,
                file_data: base64,
                mime_type: file.type,
                file_type: this.uploadFileType,
              });
              const res = await fetch(window.appData.GAS_URL + '?' + params.toString());
              const data = await res.json();
              if (data.success) {
                const { db, collection, addDoc } = window.appData;
                await addDoc(collection(db, 'files'), {
                  case_id: this.selectedCase.id,
                  file_name: file.name,
                  drive_file_id: data.file_id,
                  url: data.url,
                  uploader_id: this.user.uid,
                  uploader_name: this.user.name,
                  uploaded_at: new Date().toISOString(),
                  file_type: this.uploadFileType,
                });
              }
            } catch(e) {
              console.error('アップロードエラー:', file.name, e);
            }
          }
          await this.loadFiles();
          this.uploadingFile = false;
        },

        // 案件情報を保存
        async saveCase() {
          const { db, doc, updateDoc } = window.appData;
          const now = new Date().toISOString();
          await updateDoc(doc(db, 'cases', this.selectedCase.id), {
            ...this.editCase,
            updated_at: now,
          });
          // ローカルの選択中案件を更新
          Object.assign(this.selectedCase, this.editCase, { updated_at: now });
          this.editLocked = true;
        },

        openNewCase() {
          this.newCase = {
            sf_record_id: '', shipper_name: '', contractor_name: '',
            consultation_type: '単価交渉', priority: '通常',
            shipper_conditions: '', contractor_conditions: '', summary: '',
          };
          this.sfFetched = false;
          this.showNewCase = true;
        },

        async fetchSfForNewCase() {
          if (!this.newCase.sf_record_id) return;
          const token = await this.getGasToken();
          const url = window.appData.GAS_URL + '?action=getSfData&account_id=' + this.newCase.sf_record_id + '&token=' + token;
          const res = await fetch(url);
          const data = await res.json();

          if (data.record) {
            if (data.shipper_name) this.newCase.shipper_name = data.shipper_name;
            if (data.contractor_name) this.newCase.contractor_name = data.contractor_name;
            this.sfFetched = true;
            this.sfFetchedMsg = [
              `取得成功：${data.record_name}`,
              data.shipper_name ? `荷主: ${data.shipper_name}` : '',
              data.contractor_name ? `委託先: ${data.contractor_name}` : '',
              data.driver_situation ? `配車ステータス: ${data.driver_situation}` : '',
              data.start_date ? `開始: ${data.start_date}` : '',
              data.end_date ? `終了: ${data.end_date}` : '',
            ].filter(Boolean).join('　');
          } else {
            this.sfFetched = true;
            this.sfFetchedMsg = 'SFデータが見つかりません: ' + (data.error || '');
          }
        },

        async submitNewCase() {
          const { db, collection, addDoc } = window.appData;
          const now = new Date().toISOString();

          // SFデータを取得してDBに格納
          let sfInfo = {};
          if (this.newCase.sf_record_id) {
            try {
              const url = window.appData.GAS_URL + '?action=getSfData&account_id=' + this.newCase.sf_record_id;
              const res = await fetch(url);
              const data = await res.json();
              if (data.record) {
                sfInfo = {
                  sf_record_name:      data.record_name || '',
                  sf_shipper_name:     data.shipper_name || '',
                  sf_contractor_name:  data.contractor_name || '',
                  sf_driver_situation: data.driver_situation || '',
                  sf_partner_type:     data.partner_type || '',
                  sf_start_date:       data.start_date || '',
                  sf_end_date:         data.end_date || '',
                  sf_fetched_at:       now,
                };
                // 荷主・委託先名が未入力なら自動補完
                if (!this.newCase.shipper_name && data.shipper_name)
                  this.newCase.shipper_name = data.shipper_name;
                if (!this.newCase.contractor_name && data.contractor_name)
                  this.newCase.contractor_name = data.contractor_name;
              }
            } catch(e) {
              console.error('SF取得エラー（登録は続行）:', e);
            }
          }

          // Firestoreに案件を保存（SF情報も一緒に）
          const docRef = await addDoc(collection(db, 'cases'), {
            ...this.newCase,
            ...sfInfo,
            owner_id: this.user.uid,
            owner_name: this.user.name,
            status: '新規相談',
            created_at: now,
            updated_at: now,
          });

          // ステータスログ
          await addDoc(collection(db, 'status_log'), {
            case_id: docRef.id,
            old_status: '',
            new_status: '新規相談',
            changed_by: this.user.uid,
            changed_by_name: this.user.name,
            changed_at: now,
          });

          this.showNewCase = false;
        },

        async logout() {
          await window.appData.auth.signOut();
          window.location.href = 'index.html';
        },

        get filteredCases() {
          return this.cases.filter(c => {
            const q = this.searchQuery.toLowerCase();
            const matchQuery = !q ||
              (c.contractor_name || '').toLowerCase().includes(q) ||
              (c.shipper_name || '').toLowerCase().includes(q) ||
              (c.summary || '').toLowerCase().includes(q);
            const matchFilter = this.activeFilters.length === 0 || this.activeFilters.includes(c.status);
            return matchQuery && matchFilter;
          });
        },

        toggleFilter(val) {
          const idx = this.activeFilters.indexOf(val);
          if (idx >= 0) this.activeFilters.splice(idx, 1);
          else this.activeFilters.push(val);
        },

        statusColor(status) {
          const map = {
            '新規相談': 'bg-blue-100 text-blue-700',
            '公取確認中': 'bg-purple-100 text-purple-700',
            '対応方針決定': 'bg-indigo-100 text-indigo-700',
            '委託先交渉中': 'bg-amber-100 text-amber-700',
            '書類提出済': 'bg-orange-100 text-orange-700',
            '完了': 'bg-green-100 text-green-700',
            '取り下げ': 'bg-slate-100 text-slate-500',
          };
          return map[status] || 'bg-slate-100 text-slate-500';
        },

        roleAvatarColor(role) {
          const map = { '公取': 'bg-purple-500', '上長': 'bg-slate-600', '営業': 'bg-blue-500' };
          return map[role] || 'bg-slate-400';
        },

        fileTypeColor(type) {
          const map = { '提出書類': 'bg-blue-100 text-blue-700', '受領書類': 'bg-green-100 text-green-700', '添付': 'bg-slate-100 text-slate-500' };
          return map[type] || 'bg-slate-100 text-slate-500';
        },

        formatDate(iso) {
          if (!iso) return '';
          return new Date(iso).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
        },

        formatDateTime(iso) {
          if (!iso) return '';
          return new Date(iso).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        },
      };
    }
  </script>
</body>
</html>
